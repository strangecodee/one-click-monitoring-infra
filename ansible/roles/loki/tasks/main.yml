---
- name: Create Loki group
  ansible.builtin.group:
    name: "{{ loki_group }}"
    system: true
    state: present

- name: Create Loki user
  ansible.builtin.user:
    name: "{{ loki_user }}"
    group: "{{ loki_group }}"
    create_home: false
    shell: /sbin/nologin
    system: true
    state: present

- name: Create Loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0755"
  loop:
    - "{{ loki_config_dir }}"
    - "{{ loki_data_dir }}"

- name: Install unzip package
  ansible.builtin.package:
    name: unzip
    state: present

- name: Download Loki
  ansible.builtin.get_url:
    url: "{{ loki_download_url }}"
    dest: "/tmp/{{ loki_archive }}"
    mode: "0644"
    timeout: 120

- name: Extract Loki
  ansible.builtin.unarchive:
    src: "/tmp/{{ loki_archive }}"
    dest: /tmp
    remote_src: true
    creates: "/tmp/loki-linux-amd64"

- name: Install Loki binary
  ansible.builtin.copy:
    src: "/tmp/loki-linux-amd64"
    dest: "{{ loki_install_dir }}/loki"
    remote_src: true
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0755"
  notify:
    - Restart Loki

- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki.yml.j2
    dest: "{{ loki_config_dir }}/loki.yml"
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0644"
  notify:
    - Restart Loki

- name: Create Loki systemd service
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload Systemd
    - Restart Loki

- name: Enable and start Loki service
  ansible.builtin.systemd:
    name: loki
    enabled: true
    state: started
